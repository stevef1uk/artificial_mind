apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-bot
  namespace: agi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-bot
  template:
    metadata:
      labels:
        app: telegram-bot
    spec:
      nodeSelector:
        kubernetes.io/hostname: rpi58
      containers:
      - name: telegram-bot
        image: stevef1uk/telegram-agi-bot:secure
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: telegram-bot-secret
        env:
        - name: DISABLE_TELEGRAM_POLLING
          value: "false"
        - name: REDIS_URL
          value: "redis://redis.agi.svc.cluster.local:6379"
        - name: CHAT_SERVER_URL
          value: "http://hdn-server-rpi58.agi.svc.cluster.local:8080/api/v1/chat"
        - name: MCP_SERVER_URL
          value: "http://hdn-server-rpi58.agi.svc.cluster.local:8080/mcp"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
