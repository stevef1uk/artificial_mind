apiVersion: v1
kind: Service
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  selector:
    app: flight-mcp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-mcp
  template:
    metadata:
      labels:
        app: flight-mcp
    spec:
      # Optional: Pin to rpi58 node if desired
      # nodeSelector:
      #   kubernetes.io/hostname: rpi58

      containers:
      - name: mcp-server
        image: stevef1uk/flight-mcp:secure
        imagePullPolicy: Always
        args: ["--transport", "http", "--port", "8080", "-lang", "en", "-region", "FR"]
        ports:
        - containerPort: 8080
          name: http
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        env:
        - name: SCRAPER_URL
          value: "http://playwright-scraper.agi.svc.cluster.local:8085"
        - name: OLLAMA_URL
          value: "http://ollama.agi.svc.cluster.local:11434"
        - name: TZ
          value: "Europe/Paris"
        - name: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
          value: "1"
        - name: PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH
          value: "/usr/bin/chromium"
        - name: DEBUG
          value: "pw:api"
        - name: SCREENSHOT_PATH
          value: "/app/artifacts/latest_screenshot.png"
        - name: ARTIFACTS_DIR
          value: "/app/artifacts"
        - name: FLIGHT_SCRAPER_SCRIPT
          value: |
            await page.setViewportSize({ width: 1920, height: 2500 });
            await page.setUserAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36");
            
            // 1. Initial load
            console.log("Stage 1: Clearing consent...");
            await page.goto("%s");
            try { await page.waitForLoadState("networkidle", { timeout: 15000 }); } catch(e) {}
            await page.bypassConsent();
            await page.waitForTimeout(3000); 

            // 2. Search
            console.log("Stage 2: Navigating to search URL...");
            await page.goto("%s&sort=price_asc");
            await page.waitForTimeout(5000);
            await page.bypassConsent(); 

            // 3. Multi-stage wait and result verification
            console.log("Stage 3: Crushing overlays and waiting for results...");
            await page.keyboard.press("Escape");
            await page.waitForTimeout(500);
            await page.keyboard.press("Escape");
            
            await page.evaluate(async () => {
                const getResultCount = () => document.querySelectorAll("div[role='listitem'], li.pI9Vpc, [jsname='I897t']").length;
                const isStillLoading = () => document.body.innerText.includes("Loading results") || document.body.innerText.includes("Chargement");
                
                // Overlay Crusher: Remove common Google popups/modals
                const crushOverlays = () => {
                   const selectors = ['div[aria-modal="true"]', '.VfPpkd-Sx9Kwc', 'div[jsname="V67SHe"]', '.modal-open', '[role="dialog"]'];
                   selectors.forEach(s => {
                      document.querySelectorAll(s).forEach(el => el.remove());
                   });
                   document.body.style.overflow = 'auto';
                   document.documentElement.style.overflow = 'auto';
                };
                
                console.log("Waiting for results to populate...");
                for (let i = 0; i < 50; i++) {
                    crushOverlays();
                    window.scrollBy(0, 500);
                    const count = getResultCount();
                    const loading = isStillLoading();
                    
                    // We want at least 8 results on a route like LHR-CDG
                    if (count >= 8 && !loading) {
                        console.log("✅ Sufficient results found (" + count + ").");
                        break;
                    }
                    
                    if (document.body.innerText.includes("No flights") || document.body.innerText.includes("aucun vol")) {
                        console.log("✅ Confirmed no flights.");
                        break;
                    }

                    await new Promise(r => setTimeout(r, 1000));
                    if (i % 5 === 0) window.scrollTo(0, 0); 
                }
                
                // Final thorough scroll
                crushOverlays();
                for (let i = 0; i < 8; i++) {
                    window.scrollBy(0, 1200);
                    await new Promise(r => setTimeout(r, 1000));
                }
                window.scrollTo(0, 0);
                crushOverlays();
            });
            await page.waitForTimeout(3000);
        
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: artifacts
          mountPath: /app/artifacts

        livenessProbe:
          # Note: mcp-go doesn't have a built-in health check endpoint yet, 
          # so we'll just check if the port is open
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 512Mi
      - name: artifacts
        persistentVolumeClaim:
          claimName: pvc-artifacts
