apiVersion: v1
kind: Service
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  selector:
    app: flight-mcp
  ports:
    - name: http
      port: 8086
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-mcp
  template:
    metadata:
      labels:
        app: flight-mcp
    spec:
      # Optional: Pin to rpi58 node if desired
      # nodeSelector:
      #   kubernetes.io/hostname: rpi58

      containers:
      - name: mcp-server
        image: stevef1uk/flight-mcp:secure
        imagePullPolicy: Always
        args: ["--transport", "http", "--port", "8080", "-lang", "en", "-region", "FR"]
        ports:
        - containerPort: 8080
          name: http
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        env:
        - name: SCRAPER_URL
          value: "http://playwright-scraper.agi.svc.cluster.local:8085"
        - name: TZ
          value: "Europe/Paris"
        - name: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
          value: "1"
        - name: PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH
          value: "/usr/bin/chromium"
        - name: DEBUG
          value: "pw:api"
        - name: FLIGHT_SCRAPER_SCRIPT
          value: |
            await page.goto("%s");
            await page.waitForTimeout(5000);
            try { await page.bypassConsent(); } catch(e) {}
            await page.waitForTimeout(2000);
            
            // 1. Departure
            const fromLoc = page.locator("input[placeholder*='Where from'], input[placeholder*='D\\'où'], input[aria-label*='Where from'], input[value*='Current']").first();
            await fromLoc.click();
            await page.waitForTimeout(500);
            await fromLoc.fill("%s");
            await page.waitForTimeout(1500);
            await page.keyboard.press("Enter");
            await page.waitForTimeout(1000);
            
            // 2. Destination
            const toLoc = page.locator("input[placeholder*='Where to'], input[placeholder*='Où allez-vous'], input[aria-label*='Where to']").first();
            await toLoc.click();
            await page.waitForTimeout(500);
            await toLoc.fill("%s");
            await page.waitForTimeout(1500);
            await page.keyboard.press("Enter");
            await page.waitForTimeout(1000);
            
            // 3. Dates
            const dateLoc = page.locator("input[placeholder*='Departure'], input[placeholder*='Départ'], input[aria-label*='Departure']").first();
            await dateLoc.click();
            await page.waitForTimeout(2000);
            await page.keyboard.press("Control+A");
            await page.keyboard.press("Backspace");
            await page.keyboard.type("%s");
            await page.waitForTimeout(1000);
            await page.keyboard.press("Tab");
            await page.keyboard.press("Control+A");
            await page.keyboard.press("Backspace");
            await page.keyboard.type("%s");
            await page.waitForTimeout(1000);
            await page.keyboard.press("Enter");
            await page.waitForTimeout(2000);
            
            // Close any overlays
            await page.keyboard.press("Escape");
            await page.waitForTimeout(1000);
            
            // 4. Search
            console.log("Executing Search...");
            const searchBtn = page.locator("button:has-text('Search'), button:has-text('Rechercher'), button[aria-label*='Search']").first();
            if (await searchBtn.isVisible()) {
                await searchBtn.click();
            } else {
                await page.keyboard.press("Enter");
            }
            
            // Wait for results and verify
            // Wait for results to actually render
            console.log("⏳ Waiting for result elements to appear...");
            try {
                await page.waitForSelector("div[role='listitem'], li.pI9Vpc", { timeout: 30000 });
                console.log("✅ Results container detected.");
            } catch (e) {
                console.log("⚠️ Results elements not found yet, doing one last scroll and wait.");
                await page.mouse.wheel(0, 800);
                await page.waitForTimeout(5000);
            }
            
            // LOG RESULTS FOR VERIFICATION
            const resultCount = await page.locator("div[role='listitem'], li.pI9Vpc").count();
            console.log("📊 VERIFICATION: Found " + resultCount + " flight results.");
            
            if (resultCount === 0) {
               const content = await page.textContent("body");
               if (content.includes("No flights") || content.includes("aucun vol")) {
                   console.log("✅ VERIFICATION: Confirmed 'No flights found' state.");
               } else {
                   console.log("❌ VERIFICATION: Still in loading/initial state. Result count is 0 but page text length is " + (content ? content.length : 0));
               }
            }
            
            await page.waitForTimeout(10000); // Final buffer
        
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm

        livenessProbe:
          # Note: mcp-go doesn't have a built-in health check endpoint yet, 
          # so we'll just check if the port is open
          tcpSocket:
            port: 8086
          initialDelaySeconds: 15
          periodSeconds: 20
        
        readinessProbe:
          tcpSocket:
            port: 8086
          initialDelaySeconds: 5
          periodSeconds: 10

      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 512Mi
