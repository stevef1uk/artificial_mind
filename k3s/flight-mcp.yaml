apiVersion: v1
kind: Service
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  selector:
    app: flight-mcp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-mcp
  template:
    metadata:
      labels:
        app: flight-mcp
    spec:
      # Optional: Pin to rpi58 node if desired
      # nodeSelector:
      #   kubernetes.io/hostname: rpi58

      containers:
      - name: mcp-server
        image: stevef1uk/flight-mcp:secure
        imagePullPolicy: Always
        args: ["--transport", "http", "--port", "8080", "-lang", "en", "-region", "FR"]
        ports:
        - containerPort: 8080
          name: http
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        env:
        - name: SCRAPER_URL
          value: "http://playwright-scraper.agi.svc.cluster.local:8085"
        - name: OLLAMA_URL
          value: "http://ollama.agi.svc.cluster.local:11434"
        - name: TZ
          value: "Europe/Paris"
        - name: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
          value: "1"
        - name: PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH
          value: "/usr/bin/chromium"
        - name: DEBUG
          value: "pw:api"
        - name: SCREENSHOT_PATH
          value: "/app/artifacts/latest_screenshot.png"
        - name: ARTIFACTS_DIR
          value: "/app/artifacts"
        - name: FLIGHT_SCRAPER_SCRIPT
          value: |
            await page.setViewportSize({ width: 1920, height: 2500 });
            await page.setUserAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36");
            
            // 1. Initial load
            console.log("Stage 1: Clearing consent...");
            await page.goto("%s");
            try { await page.waitForLoadState("networkidle", { timeout: 15000 }); } catch(e) {}
            await page.bypassConsent();
            await page.waitForTimeout(3000); 

            // 2. Search
            console.log("Stage 2: Navigating to search URL...");
            await page.goto("%s&sort=price_asc");
            await page.waitForTimeout(5000);
            await page.bypassConsent(); 

            // 3. Diagnostic Wait and Results Extraction
            console.log("Stage 3: Running Diagnostics and Waiting...");
            await page.waitForTimeout(5000); // 5s static wait to let things settle
            
            await page.evaluate(async () => {
                console.log("DEBUG: Page Title = " + document.title);
                console.log("DEBUG: Current URL = " + window.location.href);
                
                // Overlay Crusher
                document.querySelectorAll('div[aria-modal="true"], [role="dialog"], .VfPpkd-Sx9Kwc').forEach(el => el.remove());
                
                const results = document.querySelectorAll("div[role='listitem'], li.pI9Vpc, [jsname='I897t']");
                console.log("DEBUG: Found " + results.length + " potential result elements.");
                
                if (results.length > 0) {
                    const snippets = Array.from(results).slice(0, 5).map(el => el.innerText.substring(0, 40).replace(/\n/g, ' '));
                    console.log("DEBUG: Result Snippets: " + snippets.join(" | "));
                } else {
                    console.log("DEBUG: No results found. Body Text (first 200 chars): " + document.body.innerText.substring(0, 200).replace(/\n/g, ' '));
                }

                // If we are stuck on a "Select City" page, try to click the first option
                if (document.title.includes("Select") || document.title.includes("Choisir")) {
                    console.log("DEBUG: Detected selection page. Clicking first option...");
                    const firstOption = document.querySelector("[role='link'], [role='button']");
                    if (firstOption) firstOption.click();
                }
                
                // Force a scroll to bottom to ensure lazy loads trigger
                window.scrollTo(0, 5000);
            });

            await page.waitForTimeout(5000);
            console.log("Final check before screenshot...");
            await page.keyboard.press("Escape");
            await page.waitForTimeout(2000);
            
            // Re-run results check after the scroll
            await page.evaluate(() => {
                const results = document.querySelectorAll("div[role='listitem'], li.pI9Vpc");
                console.log("DEBUG: Post-scroll result count: " + results.length);
            });
        
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: artifacts
          mountPath: /app/artifacts

        livenessProbe:
          # Note: mcp-go doesn't have a built-in health check endpoint yet, 
          # so we'll just check if the port is open
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 512Mi
      - name: artifacts
        persistentVolumeClaim:
          claimName: pvc-artifacts
