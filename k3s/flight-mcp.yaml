apiVersion: v1
kind: Service
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  selector:
    app: flight-mcp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-mcp
  template:
    metadata:
      labels:
        app: flight-mcp
    spec:
      # Optional: Pin to rpi58 node if desired
      # nodeSelector:
      #   kubernetes.io/hostname: rpi58

      containers:
      - name: mcp-server
        image: stevef1uk/flight-mcp:secure
        imagePullPolicy: Always
        args: ["--transport", "http", "--port", "8080", "-lang", "en", "-region", "FR"]
        ports:
        - containerPort: 8080
          name: http
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        env:
        - name: SCRAPER_URL
          value: "http://playwright-scraper.agi.svc.cluster.local:8085"
        - name: OLLAMA_URL
          value: "http://ollama.agi.svc.cluster.local:11434"
        - name: TZ
          value: "Europe/Paris"
        - name: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
          value: "1"
        - name: PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH
          value: "/usr/bin/chromium"
        - name: DEBUG
          value: "pw:api"
        - name: SCREENSHOT_PATH
          value: "/app/artifacts/latest_screenshot.png"
        - name: ARTIFACTS_DIR
          value: "/app/artifacts"
        - name: FLIGHT_SCRAPER_SCRIPT
          value: |
            await page.setViewportSize({ width: 1920, height: 2500 });
            await page.setUserAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36");
            
            // 1. Initial load to clear consent and set locale
            console.log("Stage 1: Clearing consent on Travel Flights...");
            await page.goto("%%s");
            try { await page.waitForLoadState("networkidle", { timeout: 15000 }); } catch(e) {}
            await page.bypassConsent();
            await page.waitForTimeout(3000); 

            // 2. Perform the search
            console.log("Stage 2: Performing search via direct URL...");
            await page.goto("%%s&sort=price_asc");
            await page.waitForTimeout(5000);
            await page.bypassConsent(); 
            
            // Final check for results (Increase timeout to 60s for Pi)
            console.log("Waiting for results table (60s timeout)...");
            try {
              await page.waitForSelector("div[role='listitem'], li.pI9Vpc, [aria-label*='Flight details']", { timeout: 60000 });
            } catch(e) {
               console.log("⚠️ Selector timeout reached, proceeding with best-effort screenshot.");
            }
            
            // 3. Scroll and Expand to ensure all results load
            console.log("Stage 3: Deep scrolling and expanding results...");
            await page.evaluate(async () => {
                for (let i = 0; i < 8; i++) {
                    window.scrollBy(0, 1000);
                    await new Promise(r => setTimeout(r, 1000));
                }
                window.scrollTo(0, 0);
            });
            await page.waitForTimeout(3000);
            
            // Final verify: does a price symbol exist? (Wait up to 20s more)
            console.log("⏳ Final check for data visibility...");
            for (let i = 0; i < 20; i++) {
                const content = await page.textContent("body");
                if (content.match(/[€£$¥]/)) {
                    console.log("✅ Data visible.");
                    break;
                }
                await page.waitForTimeout(1000);
            }
            
            // LOG RESULTS FOR VERIFICATION
            const resultCount = await page.locator("div[role='listitem'], li.pI9Vpc").count();
            console.log("📊 VERIFICATION: Found " + resultCount + " result items.");
            
            if (resultCount === 0) {
               const content = await page.textContent("body");
               if (content.includes("No flights") || content.includes("aucun vol") || content.includes("No practical flights")) {
                   console.log("✅ VERIFICATION: Confirmed 'No flights found' message.");
               } else {
                   console.log("❌ VERIFICATION: Result count is 0 and no 'No flights' message. Page text length: " + (content ? content.length : 0));
               }
            }
            
            await page.waitForTimeout(5000); // Small final buffer for animations Small final buffer for animations
        
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: artifacts
          mountPath: /app/artifacts

        livenessProbe:
          # Note: mcp-go doesn't have a built-in health check endpoint yet, 
          # so we'll just check if the port is open
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 512Mi
      - name: artifacts
        persistentVolumeClaim:
          claimName: pvc-artifacts
