apiVersion: v1
kind: Service
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  selector:
    app: flight-mcp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-mcp
  template:
    metadata:
      labels:
        app: flight-mcp
    spec:
      # Optional: Pin to rpi58 node if desired
      # nodeSelector:
      #   kubernetes.io/hostname: rpi58

      containers:
      - name: mcp-server
        image: stevef1uk/flight-mcp:secure
        imagePullPolicy: Always
        args: ["--transport", "http", "--port", "8080", "-lang", "en", "-region", "FR"]
        ports:
        - containerPort: 8080
          name: http
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        env:
        - name: SCRAPER_URL
          value: "http://playwright-scraper.agi.svc.cluster.local:8085"
        - name: OLLAMA_URL
          value: "http://ollama.agi.svc.cluster.local:11434"
        - name: TZ
          value: "Europe/Paris"
        - name: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
          value: "1"
        - name: PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH
          value: "/usr/bin/chromium"
        - name: DEBUG
          value: "pw:api"
        - name: SCREENSHOT_PATH
          value: "/app/artifacts/latest_screenshot.png"
        - name: ARTIFACTS_DIR
          value: "/app/artifacts"
        - name: FLIGHT_SCRAPER_SCRIPT
          value: |
            await page.setViewportSize({ width: 1280, height: 1600 });
            await page.setUserAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36");
            
            console.log("Stage 1: Navigating to search URL...");
            await page.goto("%s", { waitUntil: 'networkidle', timeout: 60000 });
            
            // Handle Google Consent Dialog (including iframes)
            console.log("Stage 1.5: Searching for consent buttons...");
            const dismissConsent = async (frame) => {
              const selectors = [
                'button:has-text("Accept all")', 
                'button:has-text("I agree")',
                'button:has-text("Agree")',
                'button#L2AGLb',
                '.VfPpkd-LgbsSe'
              ];
              for (const selector of selectors) {
                try {
                  const btn = await frame.$(selector);
                  if (btn) {
                    await btn.click();
                    console.log(`✅ Dismissed consent via ${selector}`);
                    return true;
                  }
                } catch (e) {}
              }
              return false;
            };

            // Check main page and all iframes
            if (!await dismissConsent(page)) {
              for (const frame of page.frames()) {
                if (await dismissConsent(frame)) break;
              }
            }
            await page.waitForTimeout(3000);

            // Navigate to the final results URL (if different)
            await page.goto("%s", { waitUntil: 'networkidle', timeout: 60000 });
            
            // Scroll to trigger lazy-load
            await page.evaluate(() => window.scrollBy(0, 400));
            await page.waitForTimeout(10000); // 10s wait for Pi rendering
            
            // Wait for flight items to appear
            try {
              await page.waitForSelector('li.pI9Vpc', { timeout: 15000 });
              console.log('✅ Results visible');
            } catch (e) {
              console.log('⚠️ Result selector timeout - Proceeding with safety screenshot');
            }
            
            await page.screenshot({ path: '/app/artifacts/latest_screenshot.png', fullPage: false });
            console.log('HTML_START');
            console.log(await page.content());
            console.log('HTML_END');
        
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: artifacts
          mountPath: /app/artifacts

        livenessProbe:
          # Note: mcp-go doesn't have a built-in health check endpoint yet, 
          # so we'll just check if the port is open
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 512Mi
      - name: artifacts
        persistentVolumeClaim:
          claimName: pvc-artifacts
