apiVersion: v1
kind: Service
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  selector:
    app: flight-mcp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-mcp
  template:
    metadata:
      labels:
        app: flight-mcp
    spec:
      # Optional: Pin to rpi58 node if desired
      # nodeSelector:
      #   kubernetes.io/hostname: rpi58

      containers:
      - name: mcp-server
        image: stevef1uk/flight-mcp:secure
        imagePullPolicy: Always
        args: ["--transport", "http", "--port", "8080", "-lang", "en", "-region", "FR"]
        ports:
        - containerPort: 8080
          name: http
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        env:
        - name: SCRAPER_URL
          value: "http://playwright-scraper.agi.svc.cluster.local:8085"
        - name: OLLAMA_URL
          value: "http://ollama.agi.svc.cluster.local:11434"
        - name: TZ
          value: "Europe/Paris"
        - name: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
          value: "1"
        - name: PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH
          value: "/usr/bin/chromium"
        - name: DEBUG
          value: "pw:api"
        - name: SCREENSHOT_PATH
          value: "/app/artifacts/latest_screenshot.png"
        - name: ARTIFACTS_DIR
          value: "/app/artifacts"
        - name: FLIGHT_SCRAPER_SCRIPT
          value: |
            await page.setViewportSize({ width: 1920, height: 2500 });
            await page.setUserAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36");
            
            // 1. Initial load
            console.log("Stage 1: Clearing consent...");
            await page.goto("%s");
            try { await page.waitForLoadState("networkidle", { timeout: 15000 }); } catch(e) {}
            await page.bypassConsent();
            await page.waitForTimeout(3000); 

            // 2. Search
            console.log("Stage 2: Navigating to search URL...");
            await page.goto("%s&sort=price_asc");
            await page.waitForTimeout(5000);
            await page.bypassConsent(); 

            // 3. Robust Wait for Results
            console.log("Stage 3: Waiting for results to appear (up to 30s)...");
            try {
                await page.waitForSelector("div[role='listitem'], li.pI9Vpc, [jsname='I897t']", { timeout: 30000 });
                console.log("✅ Results selector detected!");
            } catch (e) {
                console.log("⚠️ Results selector NOT found after 30s. Checking body text...");
            }
            
            await page.evaluate(async () => {
                const results = document.querySelectorAll("div[role='listitem'], li.pI9Vpc, [jsname='I897t']");
                console.log("DEBUG RESULTS COUNT: " + results.length);
                if (results.length > 0) {
                    const snippets = Array.from(results).slice(0, 3).map(el => el.innerText.substring(0, 30).replace(/\n/g, ' '));
                    console.log("DEBUG PREVIEW: " + snippets.join(" | "));
                }
                window.scrollTo(0, 3000);
            });

            await page.waitForTimeout(5000);
            await page.keyboard.press("Escape");
            await page.waitForTimeout(2000);
        
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: artifacts
          mountPath: /app/artifacts

        livenessProbe:
          # Note: mcp-go doesn't have a built-in health check endpoint yet, 
          # so we'll just check if the port is open
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 512Mi
      - name: artifacts
        persistentVolumeClaim:
          claimName: pvc-artifacts
