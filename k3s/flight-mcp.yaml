apiVersion: v1
kind: Service
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  selector:
    app: flight-mcp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-mcp
  namespace: agi
  labels:
    app: flight-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-mcp
  template:
    metadata:
      labels:
        app: flight-mcp
    spec:
      # Optional: Pin to rpi58 node if desired
      # nodeSelector:
      #   kubernetes.io/hostname: rpi58

      containers:
      - name: mcp-server
        image: stevef1uk/flight-mcp:secure
        imagePullPolicy: Always
        args: ["--transport", "http", "--port", "8080", "-lang", "en", "-region", "FR"]
        ports:
        - containerPort: 8080
          name: http
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        env:
        - name: SCRAPER_URL
          value: "http://playwright-scraper.agi.svc.cluster.local:8085"
        - name: OLLAMA_URL
          value: "http://ollama.agi.svc.cluster.local:11434"
        - name: TZ
          value: "Europe/Paris"
        - name: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
          value: "1"
        - name: PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH
          value: "/usr/bin/chromium"
        - name: DEBUG
          value: "pw:api"
        - name: SCREENSHOT_PATH
          value: "/app/artifacts/latest_screenshot.png"
        - name: ARTIFACTS_DIR
          value: "/app/artifacts"
        - name: FLIGHT_SCRAPER_SCRIPT
          value: |
            await page.setViewportSize({ width: 1920, height: 2500 });
            await page.setUserAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36");
            
            // 1. Initial load to clear consent and set locale
            console.log("Stage 1: Clearing consent...");
            await page.goto("%s");
            await page.waitForLoadState("networkidle", { timeout: 30000 }); // More patience for Pi
            await page.bypassConsent();
            await page.waitForTimeout(5000); // 5s wait after consent

            // 2. Direct Search URL (Most stable for K3s)
            console.log("Stage 2: Navigating to search results...");
            await page.goto("%s&sort=price_asc");
            await page.waitForLoadState("networkidle", { timeout: 30000 });
            await page.bypassConsent(); // Handle secondary consent wall
            
            // 3. High-Patience Result Detection
            console.log("Stage 3: Waiting for result elements...");
            try {
                await page.waitForSelector("div[role=\"listitem\"], .pI9Vpc, [jsname=\"I897t\"], div[aria-label^=\"Flight\"], .nS495e", { timeout: 45000 });
                console.log("✅ Results detected!");
            } catch (e) {
                console.log("⚠️ Results timeout - taking safety screenshot anyway.");
            }

            // 4. Scroll & Expand (Force lazy loading of all results)
            console.log("Stage 4: Scrolling to force lazy-load...");
            await page.mouse.wheel(0, 1500);
            await page.waitForTimeout(3000);
            await page.mouse.wheel(0, -1500);
            await page.waitForTimeout(2000);
            await page.keyboard.press("Escape"); // Crush any overlays
            await page.waitForTimeout(2000);
            
            await page.waitForTimeout(5000); // Small buffer for final render
        
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: artifacts
          mountPath: /app/artifacts

        livenessProbe:
          # Note: mcp-go doesn't have a built-in health check endpoint yet, 
          # so we'll just check if the port is open
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 512Mi
      - name: artifacts
        persistentVolumeClaim:
          claimName: pvc-artifacts
