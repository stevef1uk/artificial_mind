apiVersion: apps/v1
kind: Deployment
metadata:
  name: hdn-server-rpi58
  namespace: agi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hdn-server-rpi58
  template:
    metadata:
      labels:
        app: hdn-server-rpi58
    spec:
      nodeSelector:
        kubernetes.io/hostname: rpi58
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: hdn-server
          image: stevef1uk/hdn-server:secure
          imagePullPolicy: Always
          args: ["--domain", "/app/config/domain.json", "--config", "/app/config/config.json", "--port", "8080", "--mode", "server"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: QUIET
              value: "1"
            - name: DRONE_TOKEN
              value: "JnFN2PMNrjlb0r85slGbNWfYFGxD68wd"
            - name: DRONE_REPO
              value: "stevef/agi-runtime"
            - name: NEO4J_URI
              value: "bolt://neo4j.agi.svc.cluster.local:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASS
              value: "test1234"
            - name: REDIS_URL
              value: "redis://redis.agi.svc.cluster.local:6379"
            - name: WEAVIATE_URL
              value: "http://weaviate.agi.svc.cluster.local:8080"
            - name: NATS_URL
              value: "nats://nats.agi.svc.cluster.local:4222"
            - name: PRINCIPLES_URL
              value: "http://principles-server.agi.svc.cluster.local:8080"
            - name: PLAYWRIGHT_SCRAPER_URL
              value: "http://playwright-scraper.agi.svc.cluster.local:8085"
            - name: SCRAPER_POLL_INTERVAL_MS
              value: "1000"
            - name: SCRAPER_JOB_TIMEOUT_SECONDS
              value: "90"
            # LLM configuration from secret (can be updated without changing deployment)
            - name: LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: LLM_PROVIDER
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: LLM_MODEL
            - name: LLM_NUM_CTX
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: LLM_NUM_CTX
                  optional: true
            - name: LLM_NUM_PREDICT
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: LLM_NUM_PREDICT
                  optional: true
            - name: LLM_TIMEOUT_SECONDS
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: LLM_TIMEOUT_SECONDS
            - name: LLM_TIMEOUT
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: LLM_TIMEOUT
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: LLM_API_KEY
                  optional: true
            # Use OPENAI_BASE_URL for OpenAI-compatible servers (llama.cpp)
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: OPENAI_BASE_URL
                  optional: true
            # Fallback: OLLAMA_BASE_URL for Ollama servers
            - name: OLLAMA_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: OLLAMA_BASE_URL
                  optional: true
            - name: HDN_URL
              value: "http://hdn-server-rpi58.agi.svc.cluster.local:8080"
            - name: MCP_ENDPOINTS
              value: "http://flight-mcp.agi.svc.cluster.local:8080"
            - name: HDN_NODEPORT
              value: "30257"
            - name: SECURE_CUSTOMER_PRIVATE_PATH
              value: "/keys/customer_private.pem"
            - name: SECURE_VENDOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: secure-vendor
                  key: token
            - name: N8N_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: secure-vendor
                  key: token
            - name: N8N_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: N8N_WEBHOOK_URL
                  optional: true
            - name: RESEARCH_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: RESEARCH_WEBHOOK_URL
                  optional: true
            - name: RESEARCH_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: secure-vendor
                  key: RESEARCH_WEBHOOK_SECRET
                  optional: true
            # Telegram configuration for agent notifications
            - name: TELEGRAM_OUTBOUND_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-secret
                  key: TELEGRAM_OUTBOUND_WEBHOOK
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-secret
                  key: TELEGRAM_CHAT_ID
            - name: NEMOCLAW_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-secret
                  key: TELEGRAM_OUTBOUND_WEBHOOK
            - name: PICOCLAW_WS_HOST
              value: "192.168.1.60"
            - name: PICOCLAW_WS_PORT
              value: "18790"
            - name: PICOCLAW_WS_TOKEN
              value: "test-token"
            - name: ARTIFACTS_DIR
              value: "/app/artifacts"
            - name: UNPACK_WORK_DIR
              value: "/tmp/unpack"
            # Docker resource limits for Raspberry Pi (increased for code validation)
            - name: DOCKER_MEMORY_LIMIT
              value: "512m"
            - name: DOCKER_CPU_LIMIT
              value: "1.0"
            - name: DOCKER_PIDS_LIMIT
              value: "256"
            - name: DOCKER_TMPFS_SIZE
              value: "128m"
            - name: ENABLE_ARM64_TOOLS
              value: "true"
            - name: EXECUTION_METHOD
              value: "ssh"
            # GPU Optimization: Reduced concurrent execution limits (increased for testing)
            - name: HDN_MAX_CONCURRENT_EXECUTIONS
              value: "10"
            # GPU Optimization: LLM request throttling (prevents GPU overload)
            # Set to 2-3 for RPI to allow background work while limiting GPU load
            - name: LLM_MAX_CONCURRENT_REQUESTS
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: LLM_MAX_CONCURRENT_REQUESTS
            # Async LLM Queue Configuration
            - name: USE_ASYNC_LLM_QUEUE
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: USE_ASYNC_LLM_QUEUE
            - name: ASYNC_LLM_MAX_WORKERS
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: ASYNC_LLM_MAX_WORKERS
            - name: ASYNC_LLM_TIMEOUT_SECONDS
              valueFrom:
                secretKeyRef:
                  name: llm-config
                  key: ASYNC_LLM_TIMEOUT_SECONDS
            # Enable background LLM work (FSM, learning, etc.) - allow background processes
            - name: DISABLE_BACKGROUND_LLM
              value: "1"
            - name: RPI_HOST
              value: "192.168.1.63"
            - name: RPI_USER
              value: "pi"
            - name: IMAGING_HOST
              value: "192.168.1.60"
            - name: IMAGING_USER
              value: "stevef"
            - name: HDN_TOOL_TIMEOUT
              value: "300"
            - name: HDN_INTERPRET_TIMEOUT
              value: "180"
            - name: ALLOW_REQUESTS
              value: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 10
          resources:
            requests:
              memory: "2Gi"
              cpu: "200m"
            limits:
              memory: "4Gi"
              cpu: "1000m"
          volumeMounts:
            - name: customer-key
              mountPath: /keys
              readOnly: true
            - name: hdn-config
              mountPath: /app/config
              readOnly: true
            - name: ssh-keys
              mountPath: /root/.ssh
              readOnly: true
            - name: artifacts
              mountPath: /app/artifacts
      volumes:
        - name: customer-key
          secret:
            secretName: secure-customer-private
        - name: hdn-config
          configMap:
            name: hdn-config
            items:
              - key: config.json
                path: config.json
              - key: domain.json
                path: domain.json
              - key: agents.yaml
                path: agents.yaml
              - key: n8n_mcp_skills.yaml
                path: n8n_mcp_skills.yaml
              - key: tools_bootstrap.json
                path: tools_bootstrap.json
        - name: ssh-keys
          secret:
            secretName: ssh-keys
            defaultMode: 0600
        - name: artifacts
          persistentVolumeClaim:
            claimName: pvc-artifacts
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
---
apiVersion: v1
kind: Service
metadata:
  name: hdn-server-rpi58
  namespace: agi
spec:
  type: NodePort
  selector:
    app: hdn-server-rpi58
  ports:
    - port: 8080
      targetPort: http
      nodePort: 30257
      name: http
