apiVersion: v1
kind: ConfigMap
metadata:
  name: hdn-config
  namespace: agi
apiVersion: v1
kind: ConfigMap
metadata:
  name: hdn-config
  namespace: agi
data:
  USER_NAME: "Steven Fisher"
  RPI_USER: "stevef"
  agents.yaml: |
    agents:
      - id: email_monitor_agent
        name: Email Monitor Agent
        description: Monitors emails and takes actions based on content
        role: Email Monitoring Specialist
        goal: Monitor inbox for important emails and notify or take actions
        backstory: |
          You are an email monitoring specialist that watches for important messages,
          categorizes them, and takes appropriate actions like flagging urgent items
          or summarizing daily digests.
        tools:
          - mcp_read_google_data
          - mcp_save_episode
          - tool_http_get
        capabilities:
          max_iterations: 10
          verbose: true
        triggers:
          schedule:
            - cron: '*/30 * * * *'
              action: check_emails
          events:
            - type: user_request
              keywords:
                - check emails
                - monitor inbox
                - email summary
            - type: goal
              goal_type: monitor_emails
        behavior:
          thinking_mode: true
          max_retries: 3
          response_format: structured
          use_memory: true
          memory_window: 24h
          prefer_tools: true
          tool_timeout: 300
        tasks:
          - id: check_unread_emails
            description: Check for unread emails and categorize them
            expected_output: List of unread emails with categories
            tools:
              - mcp_read_google_data
            parameters:
              limit: 50
              query: unread
              type: email

      - id: website_status_monitor
        name: Website Status Monitor
        description: Checks if important websites are up and running, reports their HTTP status codes, and alerts if any are down. Perfect for monitoring critical services or your own infrastructure.
        role: Website Health Monitor
        goal: Monitor a list of websites and report their status (up/down, response times, HTTP status codes) via Telegram
        backstory: |
          You are a website monitoring specialist that checks the health of websites by making HTTP requests
          and analyzing their responses. You provide clear status reports and identify any issues, then notify
          via Telegram for immediate visibility.
        tools:
          - tool_http_get
          - tool_telegram_send
        capabilities:
          max_iterations: 10
          verbose: true
        triggers:
          schedule:
            - cron: '*/15 * * * *'
              action: execute
        behavior:
          thinking_mode: true
          max_retries: 3
          response_format: structured
          use_memory: true
          memory_window: 24h
          prefer_tools: true
          tool_timeout: 300
        tasks:
          - id: monitor_task
            description: Monitor and check status of websites
            expected_output: Status report for each website (up/down, HTTP status, response time)
            tools:
              - tool_http_get
            parameters:
              websites:
                - https://me.sjfisher.com
                - https://k3s.sjfisher.com

      - id: scraper_agent
        name: Scraper Agent
        description: Intelligent scraper that can plan and execute complex web extractions
        role: Web Scraping Specialist
        goal: Plan and execute web scraping operations to extract specific data from any given URL
        backstory: |
          You are an expert web scraper that uses Playwright and intelligent planning
          to navigate complex websites, handle autocompletes, and extract data accurately.
        tools:
          - smart_scrape
          - tool_http_get
        capabilities:
          max_iterations: 15
          verbose: true
        triggers:
          events:
            - type: user_request
              keywords:
                - scrape
                - extract data
                - find price
                - flight emissions
            - type: goal
              goal_type: scrape_web
        behavior:
          thinking_mode: true
          max_retries: 5
          use_memory: true
          prefer_tools: true
          tool_timeout: 300

      - id: price_monitor_agent
        name: Price Monitor Agent
        description: Monitors product prices twice daily and alerts on Telegram if prices drop by more than 10%.
        role: Price Watcher & Analyst
        goal: Track a list of product URLs, extract prices, compare with history, and notify on significant price drops.
        backstory: |
          You are a dedicated shopping assistant. You check prices for a specific list of items twice a day.
          You maintain a historical record of prices in 'data/price_history.json'.
          Whenever you run, you compare the current price with the previous one.
          If a price falls by 10% or more, you send an urgent alert via Telegram.
        tools:
          - mcp_smart_scrape
          - tool_telegram_send
          - tool_file_read
          - tool_file_write
        capabilities:
          max_iterations: 15
          verbose: true
        triggers:
          schedule:
            - cron: '0 9,17 * * *'
              action: "Check all watched products for price drops."
        behavior:
          thinking_mode: true
          max_retries: 3
          use_memory: true
          prefer_tools: true
        tasks:
          - id: price_monitor_flow
            description: "Scrape the current price of the ASUS Ascent laptop from Amazon, compare with history, and alert if changed."
            expected_output: "The current price of the laptop and alert status."
            tools:
              - mcp_smart_scrape
              - tool_telegram_send
              - tool_file_read
              - tool_file_write
            parameters:
              url: "https://www.amazon.fr/-/en/gp/product/B0G1CC2949"
              goal: "extract the price"
              extractions:
                field_1771953582615: "div#tp-tool-tip-price-block > div > div"
              typescript_config: |
                import { test, expect } from '@playwright/test';
                test('test', async ({ page }) => {
                  await page.goto('https://www.amazon.fr/-/en/gp/product/B0G1CC2949');
                  await page.click('#sp-cc-accept');
                  await page.waitForSelector('div#tp-tool-tip-price-block > div > div');
                });
              get_html: false
          - id: price_monitor_mac_mini_m4_pro
            description: "Check the price of the Apple Mac Mini M4 Pro on Amazon.fr"
            tools:
              - mcp_smart_scrape
            parameters:
              url: "https://www.amazon.fr/-/en/dp/B0DLBY53D5"
              goal: "extract the price"
              extractions:
                price_info: ".a-price.aok-align-center .a-offscreen"
              typescript_config: |
                import { test, expect } from '@playwright/test';
                test('test', async ({ page }) => {
                  await page.goto('https://www.amazon.fr/-/en/dp/B0DLBY53D5');
                  await page.click('#sp-cc-accept');
                  await page.waitForSelector('.a-price.aok-align-center .a-offscreen');
                });
              get_html: false

      - id: bbc_morning_news_agent
        name: BBC Morning News Agent
        description: Scrapes top 10 stories from BBC News at 7 AM, summarizes them, and sends to Telegram.
        role: News Summarizer
        goal: "Use 'mcp_smart_scrape' on https://www.bbc.com/news to get headlines, then summarize them and send the summary to Telegram (8271300679) using 'tool_telegram_send'."
        backstory: |
          You are a highly efficient news anchor. Every morning at 7 AM, you visit BBC News,
          identify the top 10 most important stories, create a short and engaging summary
          of each, and deliver the update to the user's Telegram channel.
        instructions:
          - "Use mcp_smart_scrape to get headlines"
          - "Format as bullet points"
          - "Send with tool_telegram_send"
        tools:
          - tool_http_get
          - mcp_smart_scrape
          - tool_telegram_send
          - mcp_execute_code
        capabilities:
          max_iterations: 15
          verbose: true
        triggers:
          schedule:
            - cron: '0 7 * * *'
              action: "execute"
        behavior:
          thinking_mode: true
          max_retries: 3
          use_memory: true
          prefer_tools: true
        tasks:
          - id: bbc_morning_trigger
            description: Trigger the intelligent code generator to scrape and summarize BBC news.
            tools:
              - mcp_execute_code
            parameters:
              language: python
              code: |
                import os, requests, json

                def get_hdn_url():
                    candidates = [
                        "http://hdn-server:8080",
                        "http://hdn-server.default.svc.cluster.local:8080",
                        "http://hdn-server-rpi58:8080",
                        "http://127.0.0.1:30257",
                        "http://localhost:30257"
                    ]
                    for c in candidates:
                        try:
                            r = requests.get(f"{c}/api/v1/tools", timeout=300)
                            if r.status_code == 200 and "tools" in r.text:
                                return c
                        except: continue
                    return "http://localhost:8081"

                hdn_url = get_hdn_url()
                chat_id = "8271300679"

                print(f"📡 Scraper starting via {hdn_url}")

                headlines = []
                try:
                    s_url = f"{hdn_url}/api/v1/tools/mcp_smart_scrape/invoke"
                    print(f"📥 Calling scraper at {s_url}")
                    s_resp = requests.post(s_url,
                                           json={"url": "https://www.bbc.com/news", "goal": "Extract the top 10 news headlines including their page links if available."},
                                           timeout=300)
                    s_resp.raise_for_status()
                    res = s_resp.json()
                    raw = res.get("result", res)

                    if isinstance(raw, dict) and raw.get("error"):
                        headlines = [f"Scraper reported error: {raw['error']}"]
                        raw = []

                    def extract_list(data):
                        if data is None: return []
                        if isinstance(data, str):
                            s = data.strip()
                            if (s.startswith("{") and s.endswith("}")) or (s.startswith("[") and s.endswith("]")):
                                try:
                                    import json
                                    parsed = json.loads(s.replace("'", '"'))
                                    return extract_list(parsed)
                                except: pass
                        if isinstance(data, list):
                            res = []
                            for i in data:
                                inner = extract_list(i)
                                if isinstance(inner, list): res.extend(inner)
                                else: res.append(str(inner))
                            return res
                        if isinstance(data, dict):
                            for k in ["result", "results", "extracted_content", "headlines", "items", "content", "summary", "text", "message"]:
                                if k in data and data[k]:
                                    return extract_list(data[k])
                            title = data.get("title") or data.get("headline") or data.get("text")
                            url = data.get("url") or data.get("link") or data.get("page_url")
                            if title:
                                if url and str(url).startswith("http"):
                                    return [f"{title}\n<{url}>"]
                                return [str(title)]
                            if len(data) == 1:
                                return extract_list(list(data.values())[0])
                            return [str(data)]
                        if isinstance(data, str):
                            s = data.replace("\\n", "\n").strip()
                            if "\n" in s:
                                lines = [l.strip() for l in s.split("\n") if l.strip()]
                                import re
                                return [re.sub(r'^(\d+\.|\*|-|•)\s*', '', l) for l in lines]
                            import re
                            parts = re.split(r'\s*\d+\.\s+', s)
                            cleaned = [p.strip() for p in parts if p.strip()]
                            if len(cleaned) > 1: return cleaned
                            return [s]
                        return [str(data)]

                    headlines = extract_list(raw)
                except Exception as e:
                    headlines = [f"Scrape Error: {e}"]

                msg = "🗞️ *BBC Morning News Update*\n\n"
                unique_headlines = []
                seen = set()
                for h in headlines:
                    if h.lower() not in seen and len(h) > 5:
                        unique_headlines.append(h)
                        seen.add(h.lower())

                for h in unique_headlines[:12]:
                    msg += f"• {h}\n\n"

                msg += "_Generated via HDN Agent_"

                try:
                    requests.post(f"{hdn_url}/api/v1/tools/tool_telegram_send/invoke",
                                  json={"chat_id": chat_id, "message": msg, "parse_mode": "Markdown"},
                                  timeout=300)
                    print(f"✅ Sent to {chat_id}")
                except Exception as e:
                    print(f"❌ Send Failed: {e}")

