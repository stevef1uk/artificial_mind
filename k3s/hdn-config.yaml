apiVersion: v1
kind: ConfigMap
metadata:
  name: hdn-config
  namespace: agi
data:
  USER_NAME: "Steven Fisher"
  RPI_USER: "stevef"
  RPI_HOST: "192.168.1.60"
  WHISPLAY_GEN_HOST: "192.168.1.60"
  WHISPLAY_GEN_PORT: "8806"
  tools_bootstrap.json: |
    [
      {
        "id": "tool_html_scraper",
        "name": "HTML Scraper",
        "description": "Parse HTML and extract title/headings/paragraphs/links",
        "input_schema": { "url": "string" },
        "output_schema": { "items": "array" },
        "permissions": ["net:read"],
        "safety_level": "low",
        "created_by": "system"
      },
      {
        "id": "tool_http_get",
        "name": "HTTP GET",
        "description": "Fetches a URL and returns response body",
        "input_schema": { "url": "string" },
        "output_schema": { "status": "int", "body": "string" },
        "permissions": ["net:read"],
        "safety_level": "low",
        "created_by": "system"
      },
      {
        "id": "tool_json_parse",
        "name": "JSON Parse",
        "description": "Parse and pretty-print JSON from stdin or file",
        "input_schema": { "file": "string?", "stdin": "string?" },
        "output_schema": { "object": "json" },
        "permissions": [],
        "safety_level": "low",
        "created_by": "system"
      },
      {
        "id": "tool_text_search",
        "name": "Text Search",
        "description": "Regex search over stdin text",
        "input_schema": { "pattern": "string", "stdin": "string" },
        "output_schema": { "matches": "string[]" },
        "permissions": [],
        "safety_level": "low",
        "created_by": "system"
      },
      {
        "id": "tool_file_read",
        "name": "File Reader",
        "description": "Read file contents",
        "input_schema": { "path": "string" },
        "output_schema": { "content": "string" },
        "permissions": ["fs:read"],
        "safety_level": "medium",
        "created_by": "system"
      },
      {
        "id": "tool_file_write",
        "name": "File Writer",
        "description": "Write string to file",
        "input_schema": { "path": "string", "content": "string" },
        "output_schema": { "written": "int" },
        "permissions": ["fs:write"],
        "safety_level": "high",
        "created_by": "system"
      },
      {
        "id": "tool_exec",
        "name": "Shell Exec",
        "description": "Run a shell command in sandbox",
        "input_schema": { "cmd": "string" },
        "output_schema": { "stdout": "string", "stderr": "string", "exit_code": "int" },
        "permissions": ["proc:exec"],
        "safety_level": "high",
        "created_by": "system"
      },
      {
        "id": "tool_docker_list",
        "name": "Docker List",
        "description": "List containers or images",
        "input_schema": { "type": "string" },
        "output_schema": { "items": "string[]" },
        "permissions": ["docker"],
        "safety_level": "medium",
        "created_by": "system"
      },
      {
        "id": "tool_codegen",
        "name": "Codegen",
        "description": "Generate code snippet from spec",
        "input_schema": { "spec": "string" },
        "output_schema": { "code": "string" },
        "permissions": ["llm"],
        "safety_level": "medium",
        "created_by": "system"
      },
      {
        "id": "tool_weather",
        "name": "Weather Fetcher",
        "description": "Fetch weather for Europe using Open-Meteo. Defaults to Col de Corbier area.",
        "input_schema": { "lat": "float", "lon": "float", "tz": "string" },
        "output_schema": { "location": "json", "current": "json", "daily_stats": "json", "hourly_range": "json" },
        "permissions": ["net:read"],
        "safety_level": "low",
        "created_by": "system"
      },
      {
        "id": "tool_telegram_send",
        "name": "Telegram Send",
        "description": "Send message via Telegram Bot API",
        "input_schema": { "message": "string", "chat_id": "string", "parse_mode": "string" },
        "output_schema": { "success": "bool", "message_id": "int" },
        "permissions": ["net:read"],
        "safety_level": "low",
        "created_by": "system"
      },
       {
        "id": "tool_generate_image",
        "name": "Generate Image",
        "description": "Generate an image via AI and display it on the Whisplay screen.",
        "input_schema": { "prompt": "string", "source_image": "string" },
        "output_schema": { "success": "bool", "image": "string" },
        "permissions": ["net:read", "net:write"],
        "safety_level": "medium",
        "created_by": "system"
      },
      {
        "id": "mcp_research_agent",
        "name": "research_agent",
        "description": "[chat-only] Perform research using the external MCP research server. This tool is restricted to chat access only and will be skipped by the planner.",
        "input_schema": { "topic": "string", "depth": "int" },
        "output_schema": { "result": "string" },
        "permissions": ["net:read"],
        "safety_level": "medium",
        "created_by": "agent",
        "exec": {
          "type": "mcp_proxy",
          "cmd": "${RESEARCH_WEBHOOK_URL}"
        }
      }
    ]
  agents.yaml: |
    agents:
      - id: email_monitor_agent
        name: Email Monitor Agent
        description: Monitors emails and takes actions based on content
        role: Email Monitoring Specialist
        goal: Monitor inbox for important emails and notify or take actions
        backstory: |
          You are an email monitoring specialist that watches for important messages,
          categorizes them, and takes appropriate actions like flagging urgent items
          or summarizing daily digests.
        tools:
          - mcp_read_google_data
          - mcp_save_episode
          - tool_http_get
        capabilities:
          max_iterations: 10
          verbose: true
        triggers:
          schedule:
            - cron: '*/30 * * * *'
              action: check_emails
          events:
            - type: user_request
              keywords:
                - check emails
                - monitor inbox
                - email summary
            - type: goal
              goal_type: monitor_emails
        behavior:
          thinking_mode: true
          max_retries: 3
          response_format: structured
          use_memory: true
          memory_window: 24h
          prefer_tools: true
          tool_timeout: "300s"
        tasks:
          - id: check_unread_emails
            description: Check for unread emails and categorize them
            expected_output: List of unread emails with categories
            tools:
              - mcp_read_google_data
            parameters:
              limit: 50
              query: unread
              type: email

      - id: website_status_monitor
        name: Website Status Monitor
        description: Checks if important websites are up and running, reports their HTTP status codes, and alerts if any are down. Perfect for monitoring critical services or your own infrastructure.
        role: Website Health Monitor
        goal: Monitor a list of websites and report their status (up/down, response times, HTTP status codes) via Telegram
        backstory: |
          You are a website monitoring specialist that checks the health of websites by making HTTP requests
          and analyzing their responses. You provide clear status reports and identify any issues, then notify
          via Telegram for immediate visibility.
        tools:
          - tool_http_get
          - tool_telegram_send
        capabilities:
          max_iterations: 10
          verbose: true
        triggers:
          schedule:
            - cron: '*/15 * * * *'
              action: execute
        behavior:
          thinking_mode: true
          max_retries: 3
          response_format: structured
          use_memory: true
          memory_window: 24h
          prefer_tools: true
          tool_timeout: "300s"
          mute_success_notifications: true
        tasks:
          - id: monitor_task
            description: Monitor and check status of websites
            expected_output: Status report for each website (up/down, HTTP status, response time)
            tools:
              - tool_http_get
            parameters:
              websites:
                - https://me.sjfisher.com
                - https://k3s.sjfisher.com

      - id: scraper_agent
        name: Scraper Agent
        description: Intelligent scraper that can plan and execute complex web extractions
        role: Web Scraping Specialist
        goal: Plan and execute web scraping operations to extract specific data from any given URL
        backstory: |
          You are an expert web scraper that uses Playwright and intelligent planning
          to navigate complex websites, handle autocompletes, and extract data accurately.
        tools:
          - smart_scrape
          - tool_http_get
        capabilities:
          max_iterations: 15
          verbose: true
        triggers:
          events:
            - type: user_request
              keywords:
                - scrape
                - extract data
                - find price
                - flight emissions
            - type: goal
              goal_type: scrape_web
        behavior:
          thinking_mode: true
          max_retries: 5
          use_memory: true
          prefer_tools: true
          tool_timeout: "300s"

      - id: price_monitor_agent
        name: Price Monitor Agent
        description: Monitors product prices twice daily and alerts on Telegram if prices drop by more than 10%.
        role: Price Watcher & Analyst
        goal: Track a list of product URLs, extract prices, compare with history, and notify on significant price drops.
        backstory: |
          You are a dedicated shopping assistant. You check prices for a specific list of items twice a day.
          You maintain a historical record of prices in 'data/price_history.json'.
          Whenever you run, you compare the current price with the previous one.
          If a price falls by 10% or more, you send an urgent alert via Telegram.
        tools:
          - mcp_smart_scrape
          - tool_telegram_send
          - tool_file_read
          - tool_file_write
        capabilities:
          max_iterations: 15
          verbose: true
        triggers:
          schedule:
            - cron: '0 9,17 * * *'
              action: "Check all watched products for price drops."
        behavior:
          thinking_mode: true
          max_retries: 3
          use_memory: true
          prefer_tools: true
        tasks:
          - id: price_monitor_flow
            description: "Scrape the current price of the ASUS Ascent laptop from Amazon, compare with history, and alert if changed."
            expected_output: "The current price of the laptop and alert status."
            tools:
              - mcp_smart_scrape
              - tool_telegram_send
              - tool_file_read
              - tool_file_write
            parameters:
              url: "https://www.amazon.fr/-/en/gp/product/B0G1CC2949"
              goal: "extract the price"
              extractions:
                field_1771953582615: "div#tp-tool-tip-price-block > div > div"
              typescript_config: |
                import { test, expect } from '@playwright/test';
                test('test', async ({ page }) => {
                  await page.goto('https://www.amazon.fr/-/en/gp/product/B0G1CC2949');
                  await page.click('#sp-cc-accept');
                  await page.waitForSelector('div#tp-tool-tip-price-block > div > div');
                });
              get_html: false
          - id: price_monitor_mac_mini_m4_pro
            description: "Check the price of the Apple Mac Mini M4 Pro on Amazon.fr"
            tools:
              - mcp_smart_scrape
            parameters:
              url: "https://www.amazon.fr/-/en/dp/B0DLBY53D5"
              goal: "extract the price"
              extractions:
                price_info: ".a-price.aok-align-center .a-offscreen"
              typescript_config: |
                import { test, expect } from '@playwright/test';
                test('test', async ({ page }) => {
                  await page.goto('https://www.amazon.fr/-/en/dp/B0DLBY53D5');
                  await page.click('#sp-cc-accept');
                  await page.waitForSelector('.a-price.aok-align-center .a-offscreen');
                });
              get_html: false

      - id: bbc_morning_news_agent
        name: BBC Morning News Agent
        description: Scrapes top 10 stories from BBC News at 7 AM, summarizes them, and sends to Telegram.
        role: News Summarizer
        goal: "Use 'mcp_smart_scrape' on https://www.bbc.com/news to get headlines, then summarize them and send the summary to Telegram (8271300679) using 'tool_telegram_send'."
        backstory: |
          You are a highly efficient news anchor. Every morning at 7 AM, you visit BBC News,
          identify the top 10 most important stories, create a short and engaging summary
          of each, and deliver the update to the user's Telegram channel.
        instructions:
          - "Use mcp_smart_scrape to get headlines"
          - "Format as bullet points"
          - "Send with tool_telegram_send"
        tools:
          - tool_http_get
          - mcp_smart_scrape
          - tool_telegram_send
        capabilities:
          max_iterations: 15
          verbose: true
        triggers:
          schedule:
            - cron: '0 6 * * *'
              action: "execute"
        behavior:
          thinking_mode: true
          max_retries: 3
          use_memory: true
          prefer_tools: true
        tasks:
          - id: scrape_bbc_news
            description: "Scrape the top 10 news headlines from BBC News (https://www.bbc.com/news)."
            tools:
              - mcp_smart_scrape
            parameters:
              url: "https://www.bbc.com/news"
              goal: "Extract the top 10 news headlines including their page links if available."
              chat_id: "8271300679"

      - id: weather_report_agent
        name: Weather Report Agent
        description: Provides weather updates for Thonon-les-Bains at scheduled times and upon request.
        role: Weather Forecaster
        goal: "Fetch weather data using 'tool_weather', format it into a concise and readable summary, and send it to Telegram (8271300679)."
        backstory: |
          You are a reliable weather reporter. You provide accurate, concise weather updates 
          for the Thonon-les-Bains area. You focus on current conditions and the day's outlook, 
          ensuring the user is prepared for the day.
        instructions:
          - "Use tool_weather to get the latest conditions (lat: 46.2836, lon: 6.6444, tz: Berlin by default for Col de Corbier)"
          - "Format the output into a concise, readable Telegram message (e.g. use emojis, bold headers)"
          - "Send with tool_telegram_send"
        tools:
          - tool_weather
          - tool_telegram_send
        capabilities:
          max_iterations: 5
          verbose: true
        triggers:
          schedule:
            - cron: '0 6 * * *'   # 7am (adjusting for UTC+1)
              action: "execute"
            - cron: '0 11 * * *'  # 12pm
              action: "execute"
            - cron: '0 17 * * *'  # 6pm
              action: "execute"
          events:
            - type: user_request
              keywords:
                - weather
                - forecast
                - "what's the weather"
                - "how is the weather"
        behavior:
          thinking_mode: true
          max_retries: 3
          use_memory: true
          prefer_tools: true

